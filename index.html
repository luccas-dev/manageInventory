<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Estoque</title>

    <link rel="stylesheet" href="./public/css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <h1>GERENCIAMENTO DE ESTOQUE</h1>

        <header>
            <input type="text" name="searchBar" id="searchBar" placeholder="Digite o nome do produto...">
            <button id="btnNewProduct">
                <img src="./public/assets/images/add_icon.png" alt="Icone de adição">
                Novo Produto
            </button>
            <button id="btnAlert">
                <img src="./public/assets/images/alert_icon.png" alt="Icone de alerta">
                Alertas
            </button>
        </header>

        <section id="productList">
            <div class="product">
                <div class="informations">
                    <strong>Product Name</strong>
                    <p>Quantidade    EAN     Marca</p>
                </div>
                <div class="buttons">
                    <button id="editProduct">Editar Produto</button>
                    <button id="deleteProduct">Deletar Produto</button>
                    <button id="supplyStock">Abastecer Estoque</button>
                    <button id="outputProduct">Saida de Produto</button>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
