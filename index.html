<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Estoque</title>

    <link rel="stylesheet" href="./css/index.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <h1>GERENCIAMENTO DE ESTOQUE</h1>

        <header>
            <input type="text" name="searchBar" id="searchBar" placeholder="Digite o nome do produto...">
            <a id="btnNewProduct" href='/products' class="button">
                <img src="./assets/images/add_icon.png" alt="Icone de adição">
                Novo Produto
            </a>
            <a id="btnAlert" class="button">
                <img src="./assets/images/alert_icon.png" alt="Icone de alerta">
                Alertas
            </a>
        </header>

        <section id="productList">
            <div class="product">
                <div class="informations">
                    <strong>Product Name</strong>
                    <small>Quantidade    EAN     Marca</small>
                </div>
                <div class="buttons">
                    <button id="editProduct" title="Editar Produto">
                        <img src="./assets/images/edit_icon.png" alt="Icone de edição">
                    </button>
                    <button id="deleteProduct" title="Deletar Produto">
                        <img src="./assets/images/delete_icon.png" alt="Icone de deletar">
                    </button>
                    <button id="supplyStock" title="Abastecer Estoque">
                        <img src="./assets/images/supply_icon.png" alt="Icone de abastecer">
                    </button>
                    <button id="outputProduct" title="Saida de Produto">
                        <img src="./assets/images/output_icon.png" alt="Icone de saida">
                    </button>
                </div>
            </div>
            <div class="product">
                <div class="informations">
                    <strong>Product Name</strong>
                    <small>Quantidade    EAN     Marca</small>
                </div>
                <div class="buttons">
                    <button id="editProduct" title="Editar Produto">
                        <img src="./assets/images/edit_icon.png" alt="Icone de edição">
                    </button>
                    <button id="deleteProduct" title="Deletar Produto">
                        <img src="./assets/images/delete_icon.png" alt="Icone de deletar">
                    </button>
                    <button id="supplyStock" title="Abastecer Estoque">
                        <img src="./assets/images/supply_icon.png" alt="Icone de abastecer">
                    </button>
                    <button id="outputProduct" title="Saida de Produto">
                        <img src="./assets/images/output_icon.png" alt="Icone de saida">
                    </button>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
